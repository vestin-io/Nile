<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nile</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="app-shell app-shell-menubar">
    <main class="tray-panel">
      <header class="tray-header">
        <div class="tray-header-row">
          <div class="tray-header-copy">
            <div id="menubar-kicker" class="tray-kicker">Nile</div>
            <button id="back-button" class="tray-back-button is-hidden" type="button"></button>
          </div>
          <button id="open-app-button" class="tray-open-button" type="button"></button>
        </div>
        <h2 id="menubar-view-title" class="tray-section-title"></h2>
        <p id="menubar-view-subtitle" class="tray-section-subtitle is-hidden"></p>
      </header>

      <div id="menubar-content" class="tray-content"></div>
    </main>

    <script type="module" src="./menubar.js"></script>
  </body>
</html>
